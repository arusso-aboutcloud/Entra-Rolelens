name: Trivy Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 0" # Weekly Sunday 06:00 UTC
  workflow_dispatch: # Manual trigger

# Least privilege: read-only by default. Write scopes are granted per-job below
# only where needed (SARIF upload -> security-events; dashboard commit -> contents).
permissions:
  contents: read

jobs:
  # ── Dependency vulnerability scan (filesystem) ──
  vuln-scan:
    name: Vuln Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload
    strategy:
      fail-fast: false
      matrix:
        path:
          - worker    # Node.js (package.json + lockfile)
          - pipeline  # Python (requirements.txt)
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy fs scan (${{ matrix.path }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.path }}
          format: sarif
          output: trivy-vuln-${{ matrix.path }}.sarif
          severity: HIGH,CRITICAL
          exit-code: 0 # Report but don't fail

      - name: Upload vuln SARIF (${{ matrix.path }})
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-vuln-${{ matrix.path }}.sarif
          category: trivy-vuln-${{ matrix.path }}

  # ── Misconfiguration scan ──
  config-scan:
    name: Config Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
          # Scan for Dockerfile, K8s, Terraform, CloudFormation misconfigs
          # wrangler.toml is also checked for misconfigurations

      - name: Upload config SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ── Security dashboard SVG (commit to repo, skip on PRs) ──
  dashboard:
    name: Security Dashboard
    runs-on: ubuntu-latest
    needs: [vuln-scan, config-scan]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Create .trivy directory
        run: mkdir -p .trivy

      - name: Scan worker deps (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: worker
          format: json
          output: .trivy/worker.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan pipeline deps (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: pipeline
          format: json
          output: .trivy/pipeline.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Generate and commit security dashboard SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch latest master to avoid merge conflicts on generated files
          # (public repo — no credentials needed for fetch)
          git fetch origin master
          git reset --hard origin/master
          # Regenerate dashboard from latest code
          python pipeline/trivy_dashboard_svg.py
          # Commit and push
          git add assets/security-dashboard.svg
          if git diff --staged --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "data: update security dashboard [skip ci]"
            git config "http.https://github.com/.extraheader" "AUTHORIZATION: basic $(echo -n "x-access-token:${GH_PUSH_TOKEN}" | base64 -w 0)"
            git push origin master
          fi
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}

  # ── SBOM generation ──
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SBOM (worker)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: worker
          format: cyclonedx
          output: sbom-worker.json

      - name: Generate SBOM (pipeline)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: pipeline
          format: cyclonedx
          output: sbom-pipeline.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sboms
          path: |
            sbom-worker.json
            sbom-pipeline.json
          retention-days: 90
