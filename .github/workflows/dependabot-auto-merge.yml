name: Dependabot auto-merge

# Enables auto-merge for low-risk Dependabot updates (patch + minor).
# Auto-merge waits for the required status checks (vuln-scan, config-scan,
# quality-gate) before merging, so nothing lands red. Major version bumps
# are intentionally excluded and stay manual.
#
# No approval step: master has no required-review rule, and the default
# GITHUB_TOKEN is not permitted to approve PRs. Enabling auto-merge is all
# that's needed for the merge to proceed once checks pass.

on: pull_request

# Least privilege: read-only at the top level; the single job is granted
# exactly the write scope it needs to enable auto-merge.
permissions:
  contents: read

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write        # enable auto-merge / squash-merge
      pull-requests: write   # update PR auto-merge state
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch & minor)
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
